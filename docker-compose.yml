version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: planted_postgres
    environment:
      POSTGRES_DB: planted_db
      POSTGRES_USER: planted
      POSTGRES_PASSWORD: planted
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planted -d planted_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
