spring:
  application:
    name: planted-backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: 8080

logging:
  level:
    com.planted: INFO

planted:
  user:
    # Until auth keys plants by real user id, workers and settings use this tenant id.
    default-id: default
  history:
    # IANA timezone for calendar-day grouping when the plant has no latitude/longitude (or tz lookup fails).
    day-boundary-zone: UTC
  weather:
    enabled: true
    open-meteo-forecast-url: https://api.open-meteo.com/v1/forecast
    cache-ttl-minutes: 15
    past-days: 7
    forecast-days: 3
    recent-rain-week-threshold-mm: 12
    forecast-rain-threshold-mm: 3
    heat-absolute-threshold-c: 32
    heat-spike-delta-c: 6
  outdoor-reminder-refresh:
    enabled: true
    cron: "0 0 */8 * * *"
  cors:
    allowed-origin-patterns:
      - "http://localhost:3000"
      - "https://*.vercel.app"
      - "http://192.168.*.*:3000"
      - "http://10.*.*.*:3000"
      - "http://172.16.*.*:3000"
      - "http://172.17.*.*:3000"
      - "http://172.18.*.*:3000"
      - "http://172.19.*.*:3000"
      - "http://172.20.*.*:3000"
      - "http://172.21.*.*:3000"
      - "http://172.22.*.*:3000"
      - "http://172.23.*.*:3000"
      - "http://172.24.*.*:3000"
      - "http://172.25.*.*:3000"
      - "http://172.26.*.*:3000"
      - "http://172.27.*.*:3000"
      - "http://172.28.*.*:3000"
      - "http://172.29.*.*:3000"
      - "http://172.30.*.*:3000"
      - "http://172.31.*.*:3000"

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5434/planted_db
    username: planted
    password: planted
    driver-class-name: org.postgresql.Driver

planted:
  storage:
    type: local
    local-path: ./data/images
    # Optional: absolute image URLs for clients that call Spring directly. Leave unset when the UI proxies /images (Next dev).
    # public-base-url: http://192.168.1.10:8080
  queue:
    type: local
  # Must be set for the JVM that runs Spring Boot (IDE run config / shell export), not only Next.js .env.local
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o
    image-model: dall-e-3

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

planted:
  storage:
    type: s3
    s3-bucket: ${S3_BUCKET}
    s3-region: ${AWS_REGION:us-east-1}
  queue:
    type: sqs
    sqs-queue-url: ${SQS_QUEUE_URL}
    sqs-region: ${AWS_REGION:us-east-1}
  openai:
    api-key: ${OPENAI_API_KEY}
    model: gpt-4o
    image-model: dall-e-3
