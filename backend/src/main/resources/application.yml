spring:
  application:
    name: planted-backend
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

logging:
  level:
    com.planted: INFO

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5434/planted_db
    username: planted
    password: planted
    driver-class-name: org.postgresql.Driver

planted:
  storage:
    type: local
    local-path: ./data/images
  queue:
    type: local
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o
    image-model: dall-e-3

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

planted:
  storage:
    type: s3
    s3-bucket: ${S3_BUCKET}
    s3-region: ${AWS_REGION:us-east-1}
  queue:
    type: sqs
    sqs-queue-url: ${SQS_QUEUE_URL}
    sqs-region: ${AWS_REGION:us-east-1}
  openai:
    api-key: ${OPENAI_API_KEY}
    model: gpt-4o
    image-model: dall-e-3
